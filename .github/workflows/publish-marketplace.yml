name: Publish VS Code Marketplace

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      pre_release:
        description: 'Publish as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ensure tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Build extension
        run: bun run vscode:prepublish

      - name: Validate VSCE token
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "Missing VSCE_PAT secret. Add it in repository settings before publishing."
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        env:
          PRE_RELEASE: ${{ github.event.inputs.pre_release || 'false' }}
        run: |
          if [ "$PRE_RELEASE" = "true" ]; then
            bunx @vscode/vsce publish --pre-release --pat "${{ secrets.VSCE_PAT }}"
          else
            bunx @vscode/vsce publish --pat "${{ secrets.VSCE_PAT }}"
          fi
